<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMate - Standalone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .tagline {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .product-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-weight: bold;
        }
        .product-info {
            padding: 25px;
        }
        .product-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 10px;
        }
        .product-category {
            display: inline-block;
            background: #e0f2fe;
            color: #0284c7;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 15px;
        }
        .product-price {
            font-size: 2rem;
            font-weight: 800;
            color: #059669;
            margin-bottom: 15px;
        }
        .product-description {
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .status {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }
        .cart-icon {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .cart-icon:hover {
            transform: scale(1.1);
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="cart-icon" onclick="showCart()">
        🛒
        <span class="cart-count" id="cartCount">0</span>
    </div>

    <div class="container">
        <header class="header">
            <div class="logo">🛍️ ShopMate</div>
            <div class="tagline">Your Premium E-Commerce Experience</div>
        </header>

        <div class="status">
            <strong>✅ Standalone Mode Active</strong><br>
            All products loaded locally - No backend required!
        </div>

        <div class="products" id="products">
            <!-- Products will be loaded here -->
        </div>
    </div>

    <script>
        // Standalone product data
        const products = [
            {
                id: 1,
                name: "Classic White T-Shirt",
                category: "Clothing",
                price: 399,
                description: "Premium quality cotton t-shirt with a perfect fit. Comfortable for all-day wear.",
                emoji: "👕"
            },
            {
                id: 2,
                name: "Smart Watch Pro",
                category: "Electronics",
                price: 4999,
                description: "Advanced fitness tracking, heart rate monitor, and smartphone integration.",
                emoji: "⌚"
            },
            {
                id: 3,
                name: "Running Shoes",
                category: "Footwear",
                price: 2499,
                description: "Professional running shoes with advanced cushioning technology.",
                emoji: "👟"
            },
            {
                id: 4,
                name: "Denim Jacket",
                category: "Clothing",
                price: 1499,
                description: "Classic denim jacket with modern styling and premium materials.",
                emoji: "🧥"
            },
            {
                id: 5,
                name: "Wireless Headphones",
                category: "Electronics",
                price: 1299,
                description: "Premium noise-cancelling headphones with exceptional sound quality.",
                emoji: "🎧"
            },
            {
                id: 6,
                name: "Leather Wallet",
                category: "Accessories",
                price: 799,
                description: "Genuine leather wallet with RFID protection and multiple card slots.",
                emoji: "👛"
            },
            {
                id: 7,
                name: "Sunglasses",
                category: "Accessories",
                price: 599,
                description: "UV protection sunglasses with stylish design and premium lenses.",
                emoji: "🕶️"
            },
            {
                id: 8,
                name: "Backpack",
                category: "Accessories",
                price: 1299,
                description: "Durable backpack with laptop compartment and ergonomic design.",
                emoji: "🎒"
            }
        ];

        let cart = [];

        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        ${product.emoji}
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <span class="product-category">${product.category}</span>
                        <div class="product-price">₹${product.price}</div>
                        <p class="product-description">${product.description}</p>
                        <button class="btn" onclick="addToCart(${product.id})">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartCount();
            showNotification(`${product.name} added to cart!`);
        }

        function updateCartCount() {
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function showCart() {
            if (cart.length === 0) {
                showNotification('Your cart is empty!');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const items = cart.map(item => `${item.name} x${item.quantity}`).join('\n');
            
            showNotification(`Cart (${cart.length} items):\n${items}\n\nTotal: ₹${total}`);
        }

        function showNotification(message) {
            // Create a simple notification
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                background: white;
                color: #1f2937;
                padding: 20px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                max-width: 300px;
                z-index: 1000;
                white-space: pre-line;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            showNotification('Welcome to ShopMate! 🛍️');
        });
    </script>
</body>
</html>
