<!DOCTYPE html>
<html>
<head>
    <title>ShopMate - Working</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .header { text-align: center; margin-bottom: 30px; }
        .product { 
            background: white; 
            padding: 20px; 
            margin: 10px 0; 
            border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 10px auto;
        }
        .product h3 { color: #333; margin-bottom: 10px; }
        .price { color: #28a745; font-size: 1.5em; font-weight: bold; }
        .category { background: #e9ecef; padding: 5px 15px; border-radius: 20px; display: inline-block; margin: 10px 0; }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #0056b3; }
        .status { 
            background: #d4edda; 
            color: #155724; 
            padding: 15px; 
            border-radius: 5px; 
            margin-bottom: 20px; 
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛍️ ShopMate E-Commerce</h1>
        <div class="status">✅ Working Version - Products Loading Below</div>
    </div>

    <div id="productContainer">
        <!-- Products will be inserted here -->
    </div>

    <script>
        // Product data
        const products = [
            { name: "Classic T-Shirt", price: 399, category: "Clothing" },
            { name: "Smart Watch", price: 4999, category: "Electronics" },
            { name: "Running Shoes", price: 2499, category: "Footwear" },
            { name: "Headphones", price: 1299, category: "Electronics" },
            { name: "Leather Wallet", price: 799, category: "Accessories" },
            { name: "Denim Jacket", price: 1499, category: "Clothing" }
        ];

        // Function to render products
        function renderProducts() {
            const container = document.getElementById('productContainer');
            let html = '';

            products.forEach(product => {
                html += `
                    <div class="product">
                        <h3>${product.name}</h3>
                        <div class="category">${product.category}</div>
                        <div class="price">₹${product.price}</div>
                        <button onclick="addToCart('${product.name}')">Add to Cart</button>
                    </div>
                `;
            });

            container.innerHTML = html;
            console.log('Products rendered successfully!');
        }

        // Function to handle cart
        function addToCart(productName) {
            alert(`${productName} added to cart! 🛒`);
        }

        // Render products when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, rendering products...');
            renderProducts();
        });

        // Also try rendering immediately in case DOMContentLoaded already fired
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            console.log('Document ready, rendering products...');
            renderProducts();
        }
    </script>
</body>
</html>
