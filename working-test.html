<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMate - Working Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .header { background: white; padding: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: bold; color: #2563eb; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        .product { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product h3 { margin-bottom: 0.5rem; }
        .product .price { color: #2563eb; font-weight: bold; font-size: 1.2rem; }
        .product .category { background: #e5e7eb; padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.875rem; }
        .loading { text-align: center; padding: 2rem; }
        .error { text-align: center; padding: 2rem; color: red; }
        .btn { background: #2563eb; color: white; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">ShopMate E-Commerce</div>
        </div>
    </header>

    <main class="container">
        <div id="content">
            <div class="loading">Loading products...</div>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        async function loadProducts() {
            const content = document.getElementById('content');
            
            try {
                console.log('Fetching products from:', `${API_BASE}/products`);
                
                const response = await fetch(`${API_BASE}/products`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('API Response:', data);
                
                if (data.products && Array.isArray(data.products)) {
                    content.innerHTML = `
                        <h2>Products (${data.products.length})</h2>
                        <div class="products">
                            ${data.products.map(product => `
                                <div class="product">
                                    <h3>${product.name || 'Unknown Product'}</h3>
                                    <div class="category">${product.category || 'Uncategorized'}</div>
                                    <div class="price">₹${product.price || 0}</div>
                                    <p>${product.description || 'No description available'}</p>
                                    <button class="btn" onclick="addToCart('${product._id}')">Add to Cart</button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    content.innerHTML = '<div class="error">No products found</div>';
                }
                
            } catch (error) {
                console.error('Error loading products:', error);
                content.innerHTML = `
                    <div class="error">
                        <h2>Connection Error</h2>
                        <p>Cannot connect to backend server.</p>
                        <p>Error: ${error.message}</p>
                        <p>Please make sure the backend server is running on port 5000</p>
                        <button onclick="location.reload()" class="btn">Retry</button>
                    </div>
                `;
            }
        }
        
        function addToCart(productId) {
            alert('Add to cart: ' + productId);
        }
        
        // Load products when page loads
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
